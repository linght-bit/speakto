<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Speak To</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #2a3f2f;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
      padding: 20px;
      max-width: 400px;
      color: #ff6b6b;
      text-align: center;
      z-index: 999;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .error-message h2 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    .error-message p {
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div class="error-message" id="error-message">
    <h2 id="error-title"></h2>
    <p id="error-text"></p>
  </div>

  <!-- Module load order -->

  <!-- 1. Core systems -->
  <script src="core/events.js?v=20260404r2"></script>
  <script src="config/gameConfig.js?v=20260404r2"></script>

  <!-- 2. Game state -->
  <script src="core/gameState.js?v=20260404r2"></script>

  <!-- 3. Utilities -->
  <script src="utils/getText.js?v=20260404r2"></script>

  <!-- 4. Gameplay systems -->
  <script src="systems/questSystem.js?v=20260404r2"></script>
  <script src="systems/dialogueSystem.js?v=20260404r2"></script>
  <script src="systems/inventorySystem.js?v=20260404r2"></script>
  <script src="systems/pathfindingSystem.js?v=20260404r2"></script>
  <script src="systems/foxSystem.js?v=20260404r2"></script>
  <script src="systems/actionSystem.js?v=20260404r2"></script>
  <script src="systems/voiceSystem.js?v=20260404r2"></script>

  <!-- 5. Rendering and UI -->
  <script src="ui/renderPlayer.simplified.js?v=20260404r2"></script>
  <script src="ui/renderWorld.js?v=20260404r2"></script>
  <script src="ui/renderPanels.js?v=20260404r2"></script>
  <script src="ui/render.js?v=20260404r2"></script>
  <script src="ui/creativeMode.js?v=20260404r2"></script>

  <!-- 6. Bootstrap (must stay last) -->
  <script src="bootstrap.js?v=20260404r2"></script>

  <!-- 7. Test helper -->
  <script src="test-loader.js?v=20260404r2"></script>
</body>
</html>
