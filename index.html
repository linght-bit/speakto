<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speak To</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #2a3f2f;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e;
      border: 2px solid #ff6b6b;
      border-radius: 8px;
      padding: 20px;
      max-width: 400px;
      color: #ff6b6b;
      text-align: center;
      z-index: 999;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .error-message h2 {
      margin-bottom: 10px;
      font-size: 18px;
    }

    .error-message p {
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div class="error-message" id="error-message">
    <h2 id="error-title"></h2>
    <p id="error-text"></p>
  </div>

  <!-- ЗАГРУЗКА МОДУЛЕЙ В ПРАВИЛЬНОМ ПОРЯДКЕ -->

  <!-- 1. Системы (события, конфиг) -->
  <script src="core/events.js"></script>
  <script src="config/gameConfig.js"></script>

  <!-- 2. Состояние игры -->
  <script src="core/gameState.js"></script>

  <!-- 3. Утилиты (i18n, вспомогательные функции) -->
  <script src="utils/getText.js"></script>

  <!-- 4. Системы игровой логики -->
  <script src="systems/questSystem.js"></script>
  <script src="systems/dialogueSystem.js"></script>
  <script src="systems/inventorySystem.js"></script>
  <script src="systems/pathfindingSystem.js"></script>
  <script src="systems/foxSystem.js"></script>
  <script src="systems/actionSystem.js"></script>
  <script src="systems/voiceSystem.js"></script>

  <!-- 5. Рендеринг и UI -->
  <script src="ui/renderPlayer.simplified.js"></script>
  <script src="ui/render.js"></script>

  <!-- 6. Инициализация (ДОЛЖНА БЫТЬ ПОСЛЕДНЕЙ) -->
  <script src="bootstrap.js"></script>

  <!-- 7. Тестовый скрипт (только для отладки) -->
  <script src="test-loader.js"></script>
</body>
</html>
