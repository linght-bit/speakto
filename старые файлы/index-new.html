<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speak To - Апренди Португалский</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #2a3f2f;
      font-family: Arial, sans-serif;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      text-align: center;
    }

    .error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-size: 16px;
      text-align: center;
      padding: 20px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- ЗАГРУЗКА МОДУЛЕЙ В ПРАВИЛЬНОМ ПОРЯДКЕ -->

  <!-- 1. Системы (события, конфиг) -->
  <script src="core/events.js"></script>
  <script src="config/gameConfig.js"></script>

  <!-- 2. Состояние игры -->
  <script src="core/gameState.js"></script>

  <!-- 3. Утилиты (i18n, вспомогательные функции) -->
  <script src="utils/getText.js"></script>

  <!-- 4. Системы игровой логики -->
  <script src="systems/questSystem.js"></script>
  <script src="systems/dialogueSystem.js"></script>
  <script src="systems/inventorySystem.js"></script>

  <!-- 5. Рендеринг и UI -->
  <script src="ui/render.js"></script>

  <!-- 6. Инициализация (ДОЛЖНА БЫТЬ ПОСЛЕДНЕЙ) -->
  <script src="bootstrap.js"></script>
</body>
</html>
